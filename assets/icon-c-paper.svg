<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <!-- Option C · Paper
       Light/cream version showing a rendered headline in serif + warm rule.
       Suggests "preview" rather than source. The "Aa" is a classic
       font-spec signal. From "Marketplace icon — 4 concepts" exploration. -->
  <defs>
    <linearGradient id="cBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fbf8f1"/>
      <stop offset="1" stop-color="#f0eadb"/>
    </linearGradient>
  </defs>
  <rect width="256" height="256" fill="url(#cBg)"/>
  <rect width="256" height="256" fill="#d97757" opacity="0.025"/>
  <text x="36" y="62" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="700" fill="#b85a35" letter-spacing="1.2">README.MD</text>
  <text x="36" y="148" font-family="'Source Serif 4', Georgia, serif" font-size="116" font-weight="700" fill="#1a1611" letter-spacing="-4">Aa</text>
  <rect x="36" y="166" width="64" height="3.5" rx="1.5" fill="#d97757"/>
  <rect x="36" y="190" width="172" height="5" rx="2" fill="#b8aa92"/>
  <rect x="36" y="204" width="142" height="5" rx="2" fill="#cbbfa6"/>
  <rect x="36" y="218" width="100" height="5" rx="2" fill="#cbbfa6"/>
