<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <!-- Option A · Terminal Window
       A small terminal window with rendered markdown source visible.
       Most literal "Claude-Code-styled markdown preview" reading.
       From "Marketplace icon — 4 concepts" exploration. -->
  <defs>
    <linearGradient id="aBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1f1a14"/>
      <stop offset="1" stop-color="#100d0a"/>
    </linearGradient>
    <linearGradient id="aGlow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#d97757" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#d97757" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="256" height="256" fill="url(#aBg)"/>
  <circle cx="48" cy="40" r="120" fill="url(#aGlow)"/>
  <rect x="32" y="42" width="192" height="172" rx="14" fill="#0c0a07" stroke="#3a3128" stroke-width="1.5"/>
  <rect x="32" y="42" width="192" height="26" rx="14" fill="#181410"/>
  <rect x="32" y="56" width="192" height="12" fill="#181410"/>
  <circle cx="48" cy="55" r="3.6" fill="#d97757"/>
  <circle cx="62" cy="55" r="3.6" fill="#3a3128"/>
  <circle cx="76" cy="55" r="3.6" fill="#3a3128"/>
  <text x="128" y="59" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="9" font-weight="600" fill="#7a6f60" letter-spacing="0.5">readme.md</text>
  <text x="48" y="100" font-family="'JetBrains Mono', monospace" font-size="20" font-weight="700" fill="#d97757">#</text>
  <text x="68" y="100" font-family="'Source Serif 4', Georgia, serif" font-size="22" font-weight="600" fill="#f4ecda" letter-spacing="-0.5">Aurora</text>
  <rect x="48" y="116" width="160" height="1" fill="#2a221b"/>
  <rect x="48" y="130" width="120" height="6" rx="2" fill="#4a3f33"/>
  <rect x="48" y="146" width="140" height="6" rx="2" fill="#3a3025"/>
  <rect x="48" y="162" width="92" height="6" rx="2" fill="#3a3025"/>
  <rect x="48" y="180" width="160" height="22" rx="5" fill="#0a0805" stroke="#2a221b" stroke-width="1"/>
  <text x="56" y="195" font-family="'JetBrains Mono', monospace" font-size="10" font-weight="500" fill="#e8a87c">$ aurora</text>
  <rect x="105" y="187" width="7" height="11" fill="#d97757"/>
</svg>
