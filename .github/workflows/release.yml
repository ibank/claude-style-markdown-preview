name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Package extension
        run: npx --yes @vscode/vsce@latest package --no-dependencies

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vsix
          path: "*.vsix"

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: "*.vsix"
          generate_release_notes: true

      # Optional: publish to VS Code Marketplace.
      # Requires repo secret VSCE_PAT (Azure DevOps PAT with Marketplace -> Manage scope).
      - name: Publish to VS Code Marketplace
        if: startsWith(github.ref, 'refs/tags/v') && env.VSCE_PAT != ''
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: npx --yes @vscode/vsce@latest publish --no-dependencies --pat "$VSCE_PAT"

      # Optional: publish to Open VSX (for VSCodium / Cursor).
      # Requires repo secret OVSX_PAT.
      - name: Publish to Open VSX
        if: startsWith(github.ref, 'refs/tags/v') && env.OVSX_PAT != ''
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: npx --yes ovsx publish --no-dependencies -p "$OVSX_PAT"
